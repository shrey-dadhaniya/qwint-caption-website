services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    # Map the host port and container port dynamically
    ports:
      - "${PORT:-3000}:${PORT:-3000}"

    # Restart the container automatically unless explicitly stopped
    restart: unless-stopped

    # ── Environment Variables ──────────────────────────────────────
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-3000}
      - BASE_URL=${BASE_URL}
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
      - LITELLM_URL=${LITELLM_URL}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}

    # ── Volumes ────────────────────────────────────────────────────
    volumes:
      - ./payment-config.example.json:/app/payment-config.json:ro
      - plugin_downloads:/app/src/public/downloads

    # ── Health check ───────────────────────────────────────────────
    # Uses the same PORT variable to ensure internal connectivity checks pass
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:${PORT:-3000}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

# Named volume managed by Coolify/Docker
volumes:
  plugin_downloads:
